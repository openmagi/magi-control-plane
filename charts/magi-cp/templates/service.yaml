apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-cloud
  labels:
    app.kubernetes.io/name: magi-cp
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: magi-cp
    app.kubernetes.io/instance: {{ .Release.Name }}
---
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default (printf "%s-cloud" .Release.Name) .Values.serviceAccount.name }}
  labels:
    app.kubernetes.io/name: magi-cp
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
{{- if .Values.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-data
  labels:
    app.kubernetes.io/name: magi-cp
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- with .Values.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-cloud
  labels:
    app.kubernetes.io/name: magi-cp
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    {{- if .Values.ingress.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer | quote }}
    {{- end }}
    {{- if .Values.ingress.hardening.enabled }}
    nginx.ingress.kubernetes.io/proxy-body-size: {{ .Values.ingress.hardening.maxBodySize | quote }}
    nginx.ingress.kubernetes.io/limit-rps: {{ .Values.ingress.hardening.rateLimitRpsPerIp | quote }}
    {{- if .Values.ingress.hardening.securityHeaders }}
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: interest-cohort=()";
    {{- end }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if or .Values.ingress.tlsSecretName .Values.ingress.clusterIssuer }}
  tls:
    - hosts: ["{{ .Values.ingress.host }}"]
      secretName: {{ default (printf "%s-tls" .Release.Name) .Values.ingress.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-cloud
                port:
                  number: {{ .Values.service.port }}
{{- end }}
{{- if .Values.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-cloud
  namespace: {{ default .Release.Namespace .Values.serviceMonitor.namespace }}
  labels:
    app.kubernetes.io/name: magi-cp
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: magi-cp
      app.kubernetes.io/instance: {{ .Release.Name }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
