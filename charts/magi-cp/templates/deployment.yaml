{{- include "magi-cp.replicaGuard" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-cloud
  labels:
    app.kubernetes.io/name: magi-cp
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: magi-cp
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: magi-cp
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ default (printf "%s-cloud" .Release.Name) .Values.serviceAccount.name }}
      # The backend never calls the Kubernetes API; do not mount its token.
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        fsGroup: {{ .Values.securityContext.fsGroup | default .Values.securityContext.runAsUser }}
        {{- with .Values.securityContext.seccompProfile }}
        seccompProfile:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      containers:
        - name: cloud
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8787
              protocol: TCP
          env:
            - name: MAGI_CP_DSN
              value: {{ default "sqlite:////data/magi-cp.sqlite" .Values.postgres.dsn | quote }}
            - name: MAGI_CP_KEY_DIR
              value: "/data/keys"
            - name: MAGI_CP_POLICY_STORE
              value: "/data/policies.json"
            # Pack / custom-verifier / script stores default to ~/.magi-cp
            # which is on the read-only root FS here; pin them onto the /data
            # PVC so governance authoring actually persists (parity with
            # docker-compose.yml's MAGI_CP_SCRIPT_STORE_DIR=/data).
            - name: MAGI_CP_PACK_STORE
              value: "/data/packs.json"
            - name: MAGI_CP_CUSTOM_VERIFIER_STORE
              value: "/data/custom_verifiers.json"
            - name: MAGI_CP_SCRIPT_STORE_DIR
              value: "/data"
            {{- with .Values.llm.compiler }}
            - name: MAGI_CP_LLM_COMPILER
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.llm.reviewer }}
            - name: MAGI_CP_LLM_REVIEWER
              value: {{ . | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.secretRef.name }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            capabilities:
              {{- toYaml .Values.securityContext.capabilities | nindent 14 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
        {{- else }}
        - name: data
          emptyDir: {}
        {{- end }}
        - name: tmp
          emptyDir: {}
