# magi-cp helm values — production defaults.

image:
  repository: ghcr.io/openmagi/magi-control-plane
  tag: ""                    # overrides Chart.appVersion
  pullPolicy: IfNotPresent

replicaCount: 1              # >1 requires postgres.dsn; the chart fails render otherwise
                             # (SQLite on a single RWO PVC cannot be shared across replicas)

# Service-account / image-pull secrets
imagePullSecrets: []
serviceAccount:
  create: true
  name: ""

# Where the Ed25519 keypair + policy store live. PVC for single-replica;
# external KMS-backed solution for multi-replica.
persistence:
  enabled: true
  size: 1Gi
  storageClass: ""           # cluster default

# Postgres connection — when replicaCount > 1 this MUST be set
postgres:
  dsn: ""                    # e.g. postgresql+psycopg2://magi:***@pg-host:5432/magi

# Required API keys (placed in a sealed-secret / external-secret in prod;
# never commit cleartext to values.yaml). Helm reads from a pre-created
# Secret named `magi-cp-secrets` by default.
secretRef:
  name: magi-cp-secrets
  # Expected keys: MAGI_CP_API_KEY, MAGI_CP_HITL_API_KEY, MAGI_CP_ADMIN_API_KEY,
  # MAGI_CP_ADMIN_HMAC_SECRET, ANTHROPIC_API_KEY (optional), OPENAI_API_KEY (optional)

# LLM provider wiring. Point at the env-driven factories (W2).
llm:
  compiler: ""               # e.g. magi_cp.llm.anthropic_provider:anthropic_default
  reviewer: ""               # e.g. magi_cp.llm.openai_provider:openai_default

# Networking
service:
  type: ClusterIP
  port: 8787

ingress:
  enabled: false
  className: nginx
  host: ""
  tlsSecretName: ""
  # cert-manager integration. When `clusterIssuer` is set, the Ingress is
  # annotated with cert-manager.io/cluster-issuer so the TLS secret is
  # provisioned automatically. Leaving it empty keeps the chart compatible
  # with deployments that pre-provision TLS via a different controller.
  clusterIssuer: ""
  # extra ingress annotations (merged with cert-manager + nginx hardening)
  annotations: {}
  # extra hardening: per-rule rate limits, security headers
  hardening:
    enabled: true
    rateLimitRpsPerIp: 30
    maxBodySize: "256k"
    securityHeaders: true

# Resource limits (tune per replica)
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Pod security
securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  # fsGroup owns the mounted PVC so a non-root runAsUser can write /data
  # (keys, sqlite, policy/pack/verifier stores) on first boot. Without it a
  # root:root RWO PVC yields EACCES. On very large volumes some CSI drivers
  # do a recursive chown; set fsGroupChangePolicy: OnRootMismatch if that
  # startup delay bites.
  fsGroup: 10001
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop: ["ALL"]

# Prometheus ServiceMonitor (W8b)
serviceMonitor:
  enabled: false
  namespace: ""              # defaults to release namespace
  interval: 30s

# NetworkPolicy (OBS-1). /metrics shares the 8787 API port, so it cannot be
# network-isolated from the API by path; the real per-endpoint /metrics defense
# is MAGI_CP_METRICS_TOKEN. This policy hardens pod ingress in general: when
# enabled it default-denies ingress and allows only (a) the same namespace and
# (b) any namespaces matching `allowNamespaceSelector`. Leave disabled unless
# your CNI enforces NetworkPolicy, and verify the selectors match your ingress
# controller namespace or you will black-hole API traffic.
networkPolicy:
  enabled: false
  # Extra namespace label selectors allowed to reach 8787 (e.g. your ingress
  # controller + monitoring). Each entry is a matchLabels map.
  allowNamespaceSelectors: []
    # - kubernetes.io/metadata.name: ingress-nginx
    # - kubernetes.io/metadata.name: monitoring
