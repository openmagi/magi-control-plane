# fly.io single-node deployment template for the alpha pilot.
#
# Why fly.io for the alpha:
#   - One-command Korea-region (nrt) deploy
#   - Built-in HTTPS via Let's Encrypt — zero cert-manager config
#   - $0/month for the smallest VM (we're free alpha, so the math works)
#   - Volume support for the keypair dir + SQLite store
#
# Initial deploy:
#   cd deploy/
#   fly launch --copy-config --no-deploy --name magi-cp
#   fly secrets set \
#     MAGI_CP_API_KEY=$(uuidgen) \
#     MAGI_CP_HITL_API_KEY=$(uuidgen) \
#     MAGI_CP_ADMIN_API_KEY=$(uuidgen) \
#     MAGI_CP_ADMIN_HMAC_SECRET=$(python3 -c 'import secrets;print(secrets.token_hex(32))') \
#     ANTHROPIC_API_KEY=sk-ant-… \
#     OPENAI_API_KEY=sk-…
#   fly vol create magi_data --region nrt --size 3
#   fly deploy
#   fly cert add cloud.openmagi.ai
#
# Update:
#   fly deploy

app = "magi-cp"
primary_region = "nrt"          # Tokyo — closest fly.io region to Korea
kill_signal = "SIGINT"
kill_timeout = 30

[build]
  dockerfile = "../Dockerfile"

[env]
  MAGI_CP_PUBLIC_CLOUD_URL = "https://cloud.openmagi.ai"
  MAGI_CP_LLM_COMPILER = "magi_cp.llm.anthropic_provider:anthropic_default"
  MAGI_CP_LLM_REVIEWER = "magi_cp.llm.openai_provider:openai_default"

[[mounts]]
  source = "magi_data"
  destination = "/data"

[[services]]
  internal_port = 8787
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true
  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "3s"
    grace_period = "20s"
    method = "GET"
    path = "/healthz"

[deploy]
  strategy = "rolling"

[metrics]
  port = 8787
  path = "/metrics"
