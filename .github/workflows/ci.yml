name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (pytest + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (dev + observability)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,observability]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Tests (pytest)
        env:
          # In CI we exercise the deterministic path only; live-network tests
          # are gated by the `network` marker (skipped by -m "not network").
          PYTHONDONTWRITEBYTECODE: "1"
        run: pytest -q -m "not network"

      - name: Upload QA report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: .qa-report/
          if-no-files-found: ignore

  web:
    name: Web (tsc + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Design-system drift gate
        run: node scripts/check-ds-drift.mjs components/ui/_ds

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Tests (vitest)
        run: npx vitest run --reporter=default
