services:
  cloud:
    build: .
    ports: ["8787:8787"]
    volumes:
      - magi-data:/data
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped
    environment:
      MAGI_CP_HITL_API_KEY: "${MAGI_CP_HITL_API_KEY:?HITL API key required — set in .env}"
      MAGI_CP_API_KEY: "${MAGI_CP_API_KEY:?cloud API key required — set in .env}"
      MAGI_CP_ADMIN_API_KEY: "${MAGI_CP_ADMIN_API_KEY:?admin API key required (policy CRUD) — set in .env}"
      MAGI_CP_ADMIN_HMAC_SECRET: "${MAGI_CP_ADMIN_HMAC_SECRET:?HMAC shared secret w/ clawy webhook — set in .env}"
      # v2.0-W8a: switch to Postgres in multi-node deploys. Default SQLite keeps
      # single-node deploys working; the `postgres` service below is optional.
      MAGI_CP_DSN: "${MAGI_CP_DSN:-sqlite:////data/magi-cp.sqlite}"
      # D74a: ScriptStore needs a writable directory. Container HOME is
      # /home/magi which sits on the read-only rootfs. Pin onto the
      # /data volume so D63 POST /scripts can persist bodies + index.
      MAGI_CP_SCRIPT_STORE_DIR: "${MAGI_CP_SCRIPT_STORE_DIR:-/data}"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8787/healthz',timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  # v2.0-W8a — multi-node / HA path. Enable by setting:
  #   POSTGRES_PASSWORD=… in .env
  #   MAGI_CP_DSN=postgresql+psycopg2://magi:${POSTGRES_PASSWORD}@postgres:5432/magi
  # on the `cloud` service. Single-node deploys can ignore this service.
  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?postgres password required when profile is enabled}
      POSTGRES_USER: magi
      POSTGRES_DB: magi
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "magi", "-d", "magi"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  magi-data:
  pg-data:
